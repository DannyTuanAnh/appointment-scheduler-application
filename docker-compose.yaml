version: "3.8"

services:
  db:
    image: postgres:18.2-alpine3.23
    container_name: postgres-db-scheduler-app
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres-data-scheduler-app:/var/lib/postgresql/data

  redis:
    image: redis:8.6.2-alpine
    container_name: redis-scheduler-app
    restart: unless-stopped

    ports:
      - "6380:6379"

    command:
      [
        "redis-server",
        "--save",
        "900",
        "1",
        "--save",
        "300",
        "10",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    volumes:
      - redis-data-scheduler-app:/data

volumes:
  postgres-data-scheduler-app:
  redis-data-scheduler-app:
